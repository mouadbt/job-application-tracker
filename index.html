        <button type="button" class="btn-icon" aria-label="Toggle theme">

            class="size-4"

        <button class="btn-primary">Add New Application</button>
        <button class="btn-secondary">How does it work</button>

    <section>
      <input
        type="text"
        class="input"
      />
      <p>
        how people describe<!-- -->
        <span class="font-medium text-foreground">tinypad</span> after switching
        from browser bookmarks
      </p>
      <div class="card w-[22rem] sm:w-[24rem]">
        <div class="card-content">
          <div class="flex flex-col">
            <p class="text-label">maria r.</p>
            <p class="text-description">freelance writer</p>
          </div>
          <p class="text-body">
            the group-based layout is simple and surprisingly powerful. i
            stopped losing references between projects.
