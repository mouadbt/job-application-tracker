    <header class="p-8 flex items-center justify-between">
      <div>
        <h1 class="heading">Job Applications</h1>
        <hr class="bg-border h-[2px] w-12" />
      </div>
      <button
        title="Add new job application"
        type="button"
        class="btn-icon svg-wrapper"
        aria-label="Toggle theme"
        data-target="new"
        id="new-application-modal-btn"
      >
        <span class="sr-only">Add new job application</span>
      </button>
    </header>
    <main class="p-8 pt-4">
      <section class="flex gap-4 items-stretch h-min">
        <div
          data-target="vector"
          class="svg-wrapper min-w-1 rounded-xl w-full border border-border flex items-center justify-between pr-6 gap-4"
        >
          <div class="space-y-4 flex flex-col p-6 pr-0">
            <span
              class="text-muted-foreground truncate text-sm"
              id="author-el"
            ></span>
            <span class="heading mt-1 text-" id="quote-el"></span>
          </div>
        </div>
        <div
          class="bg-card text-card-foreground flex flex-col rounded-xl space-y-4 p-6 border border-border"
        >
          <span class="text-muted-foreground truncate text-sm"
            >Total Applications</span
          >
          <span class="heading mt-1 text-3xl">1</span>
        </div>
        <div
          class="bg-card text-card-foreground flex flex-col rounded-xl space-y-4 p-6 border border-border"
        >
          <div class="flex items-start justify-between space-x-2">
            <span class="text-muted-foreground truncate text-sm"
              >Monthly recurring revenue</span
            ><span class="text-sm font-medium text-emerald-700">+6.1%</span>
          </div>
          <dd class="heading mt-1 text-3xl">$34.1K</dd>
        </div>
        <div
          class="bg-card text-card-foreground flex flex-col rounded-xl space-y-4 p-6 border border-border"
        >
          <div class="flex items-start justify-between space-x-2">
            <span class="text-muted-foreground truncate text-sm"
              >Monthly recurring revenue</span
            ><span class="text-sm font-medium text-emerald-700">+6.1%</span>
          </div>
          <dd class="heading mt-1 text-3xl">$34.1K</dd>
        </div>
      </section>

      <!-- table -->
      <section class="mt-12 space-y-6">
        <div class="flex items-center justify-between">
          <h2 class="heading">Recent Applications</h2>
          <div class="flex items-center gap-2">
            <span class="text-xs">Showing 2 results</span>
          </div>
        </div>

        <div class="table-wrapper rounded-2xl border border-border">
          <table class="table">
            <thead class="table-thead">
              <tr>
                <th class="table-th">Company</th>
                <th class="table-th">Position</th>
                <th class="table-th">Status</th>
                <th class="table-th">Link</th>
                <th class="table-th">Notes</th>
                <th class="table-th text-right">Actions</th>
              </tr>
            </thead>
            <tbody class="table-tbody" id="applications-tbody">

            </tbody>
          </table>
        </div>
      </section>
    </main>
    <dialog
      id="application-modal"
      class="m-auto w-[calc(100%-2rem)] max-w-[425px] rounded-2xl border border-border bg-card p-0 shadow-lg backdrop:bg-black/20 backdrop:backdrop-blur-sm open:flex flex-col"
    >
      <header class="flex items-center justify-between p-6 pb-0">
        <div class="flex flex-col gap-1.5">
          <h4
            class="text-lg font-semibold leading-none text-foreground"
            id="dialog-title"
          ></h4>
          <p class="text-sm text-muted-foreground" id="dialog-description"></p>
        </div>
        <button
          type="button"
          class="btn-icon size-8 -mt-2 -mr-2 svg-wrapper"
          id="close-application-modal"
          data-target="x"
        ></button>
      </header>

      <!-- View Application details -->
      <section data-section="view" hidden>...</section>

      <!-- Application form -->
      <form
        id="application-modal-form"
        data-section="form"
        class="flex flex-col pt-6"
      >
        <div class="grid gap-4 p-6 pt-0 relative">
          <!-- Show Loading indecator -->
          <div
            class="absolute h-full w-full bg-background flex justify-center items-center gap-4 flex-col"
            data-section="load"
            id="loader"
          >
            <div
              class="relative block w-[130px] h-[4px] rounded-[30px] bg-primary/20 overflow-hidden before:content-[''] before:absolute before:top-0 before:left-0 before:h-full before:w-0 before:rounded-[30px] before:bg-primary before:animate-[moving_1s_ease-in-out_infinite]"
            ></div>
            <small class="text-primary/50">Loading application data...</small>
          </div>

          <div class="grid gap-2">
            <label for="company" class="text-sm font-medium"
              >Company Name</label
            >
            <input
              type="text"
              id="company"
              name="company"
              class="input"
              placeholder="e.g. Google"
              required
            />
          </div>
          <div class="grid gap-2">
            <label for="position" class="text-sm font-medium">Position</label>
            <input
              type="text"
              id="position"
              name="position"
              class="input"
              placeholder="e.g. Frontend Engineer"
              required
            />
          </div>
          <div class="grid gap-2">
            <label for="status" class="text-sm font-medium">Status</label>
            <select name="status" id="status" class="input" required>
              <option value="">Select status</option>
              <option value="wishlist">Wishlist</option>
              <option value="applied">Applied</option>
              <option value="hr-interview">HR Interview</option>
              <option value="technical-interview">Technical Interview</option>
              <option value="assessment">Assessment</option>
              <option value="final-interview">Final Interview</option>
              <option value="offer">Offer</option>
              <option value="rejected">Rejected</option>
              <option value="ghosted">Ghosted</option>
              <option value="withdrawn">Withdrawn</option>
            </select>
          </div>
          <div class="grid gap-2">
            <label for="job-url" class="text-sm font-medium">Job URL</label>
            <input
              type="url"
              class="input"
              id="job-url"
              name="job-url"
              placeholder="https://..."
            />
          </div>
          <div class="grid gap-2">
            <label for="notes" class="text-sm font-medium">Notes</label>
            <textarea
              name="notes"
              id="notes"
              class="input h-24 resize-none"
              placeholder="Any additional details..."
            ></textarea>
          </div>
        </div>
        <footer
          class="flex items-center justify-end gap-3 border-t border-border p-4 px-6"
        >
          <button
            type="button"
            class="btn-secondary"
            id="cancel-application-modal"
          >
            Cancel
          </button>
          <button type="submit" class="btn-primary">Save Application</button>
        </footer>
      </form>
    </dialog>
    <div id="application-details"></div>
    <footer></footer>
    <script type="module" src="/src/home.js"></script>
  </body>
